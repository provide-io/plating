name: 🚀 Release

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv + Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest --no-header -q

      - name: Build distributions
        run: uv run python -m build

      - name: Check distributions
        run: uv run twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate SBOM
        run: |
          uv run pip install cyclonedx-bom
          uv run cyclonedx-py environment --output-format json -o sbom-python.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.cdx.json

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-24.04
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  verify-testpypi:
    name: Verify TestPyPI
    needs: publish-testpypi
    runs-on: ubuntu-24.04
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for TestPyPI indexing
        run: sleep 30

      - name: Install from TestPyPI
        run: |
          pip install --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            plating==${{ steps.version.outputs.version }}

      - name: Verify import and version
        run: |
          python -c "
          import plating
          assert plating.__version__ == '${{ steps.version.outputs.version }}', \
              f'Version mismatch: {plating.__version__} != ${{ steps.version.outputs.version }}'
          print(f'plating {plating.__version__} OK')
          "

  publish-pypi:
    name: Publish to PyPI
    needs: [build, verify-testpypi]
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  sign-and-upload:
    name: Sign & Upload to Release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-python
          path: sbom/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3
        with:
          inputs: dist/*.whl dist/*.tar.gz

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.whl dist/*.tar.gz dist/*.sigstore.json \
            sbom/sbom-python.cdx.json \
            --clobber
